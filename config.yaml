llm:
  model: "ollama/gemma4:e4b"
  api_base: "http://localhost:11434"
  temperature: 0.3

search:
  provider: "duckduckgo"

research:
  max_iterations: 3
  max_sources: 10
  budget_tokens: 100000
  source_summary_tokens: 300

output:
  format: "markdown"
  include_confidence: true
  include_contradictions: true

sessions:
  storage_dir: "~/.open-deep-research/sessions"
